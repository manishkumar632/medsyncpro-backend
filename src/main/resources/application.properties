spring.config.import=optional:file:env.properties
spring.application.name=medsyncpro

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=admin
# spring.datasource.url=${DATABASE_URL}
# spring.datasource.username=${DATABASE_HOST_NAME}
# spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=2000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=${PORT:8080}

# App Configuration
app.frontend.url=${FRONTEND_BASE_URL}

# Brevo Configuration
brevo.api.key=${BREVO_API_KEY}
brevo.from.email=${BREVO_FROM_EMAIL}
brevo.from.name=${BREVO_FROM_NAME}
# File Upload Configuration (Cloudinary)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

# Verification Configuration
verification.token.expiry.hours=24
verification.resend.limit=5

# Registration Configuration
registration.spam.limit=3

# Admin Configuration
admin.secret=YnxiYOBowkgjhaoilkjwibIKHIlwolo

# Default Admin Credentials (override via ADMIN_EMAIL / ADMIN_PASSWORD env vars in production)
app.admin.email=${ADMIN_EMAIL:admin@medsyncpro.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}

# Medication workflow configuration
medication.adherence.default-threshold=${MED_ADHERENCE_THRESHOLD:80.0}
medication.missed-dose-grace-minutes=${MED_MISSED_DOSE_GRACE_MINUTES:120}
